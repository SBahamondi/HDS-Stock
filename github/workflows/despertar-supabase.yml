name: Mantener Supabase Despierto

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping-db:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer un ping a la API de Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/mapa?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
